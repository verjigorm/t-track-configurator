<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insert Configurator</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
    {
        "imports": {
            "three": "./vendor/three.module.js",
            "three/addons/": "./vendor/"
        }
    }
    </script>
</head>
<body>
    <div class="app">
        <!-- Left Panel: Controls -->
        <div class="controls">
            <h1><span id="mode-title">T-Track</span> <span>Insert Configurator</span></h1>

            <!-- Mode Toggle -->
            <div class="mode-toggle">
                <button id="mode-ttrack" class="active">T-Track</button>
                <button id="mode-dovetail">Dovetail</button>
                <button id="mode-knob">Knob</button>
            </div>

            <!-- Unit Toggle -->
            <div class="unit-toggle">
                <button id="unit-mm" class="active">mm</button>
                <button id="unit-in">inches</button>
            </div>

            <!-- T-Track Profile + Diagram side by side -->
            <div class="track-section" id="ttrack-section">
                <div id="track-diagram" class="diagram-container"></div>
                <div class="param-group">
                <h2>T-Track Profile</h2>
                <div class="param-row">
                    <label for="track-preset">Preset</label>
                    <select id="track-preset">
                        <option value="wide-metric">Wide metric (30mm)</option>
                        <option value="narrow-metric">Narrow metric (19mm)</option>
                        <option value="custom">Custom</option>
                    </select>
                </div>
                <div class="param-row">
                    <label for="slot_width">Slot Width</label>
                    <input type="number" id="slot_width" data-param="slot_width" data-mode="ttrack" step="0.1">
                </div>
                <div class="param-row">
                    <label for="lip_width">Lip Width</label>
                    <input type="number" id="lip_width" data-param="lip_width" data-mode="ttrack" step="0.1">
                </div>
                <div class="param-row">
                    <label for="slot_depth">Slot Depth</label>
                    <input type="number" id="slot_depth" data-param="slot_depth" data-mode="ttrack" step="0.1">
                </div>
                <div class="param-row">
                    <label for="lip_depth">Lip Depth</label>
                    <input type="number" id="lip_depth" data-param="lip_depth" data-mode="ttrack" step="0.1">
                </div>
            </div>
            </div><!-- /.ttrack-section -->

            <!-- Dovetail Profile + Diagram side by side -->
            <div class="track-section" id="dovetail-section" style="display:none">
                <div id="dovetail-diagram" class="diagram-container"></div>
                <div class="param-group">
                <h2>Dovetail Profile</h2>
                <div class="param-row">
                    <label for="dv_bottom_width">Bottom Width (B)</label>
                    <input type="number" id="dv_bottom_width" data-param="dv_bottom_width" data-mode="dovetail" step="0.1" value="12.6" data-default-mm="12.6">
                </div>
                <div class="param-row">
                    <label for="dv_height">Height (H)</label>
                    <input type="number" id="dv_height" data-param="dv_height" data-mode="dovetail" step="0.1" value="9.0" data-default-mm="9.0">
                </div>
                <div class="param-row">
                    <label for="wall_angle">Wall Angle (°)</label>
                    <input type="number" id="wall_angle" data-param="wall_angle" data-mode="dovetail" data-no-unit-convert step="0.5" value="14" data-default-mm="14">
                </div>
                <div class="param-row">
                    <label for="dv_top_width_display">Top Width (T)</label>
                    <input type="number" id="dv_top_width_display" class="derived-input" readonly tabindex="-1" step="0.1" value="8.11">
                </div>
            </div>
            </div><!-- /.dovetail-section -->

            <!-- Knob Parameters + Diagram side by side -->
            <div class="track-section" id="knob-section" style="display:none">
                <div id="knob-diagram" class="diagram-container"></div>
                <div class="param-group">
                <h2>Knob</h2>
                <div class="param-row">
                    <label for="n_prongs">Prongs</label>
                    <input type="number" id="n_prongs" data-param="n_prongs" data-mode="knob" data-no-unit-convert step="1" min="2" max="100">
                </div>
                <div class="param-row">
                    <label for="outer_diameter">Outer Diameter (D)</label>
                    <input type="number" id="outer_diameter" data-param="outer_diameter" data-mode="knob" step="0.1">
                </div>
                <div class="param-row">
                    <label for="valley_depth">Valley Depth (V)</label>
                    <input type="number" id="valley_depth" data-param="valley_depth" data-mode="knob" step="0.1">
                </div>
                <div class="param-row">
                    <label for="knob_thickness">Thickness</label>
                    <input type="number" id="knob_thickness" data-param="knob_thickness" data-mode="knob" step="0.1">
                </div>
            </div>
            </div><!-- /.knob-section -->

            <!-- Bolt Dimensions + Diagram side by side -->
            <div class="track-section">
                <div id="bolt-diagram" class="diagram-container"></div>
                <div class="param-group">
                <h2>Bolt Dimensions</h2>
                <div class="param-row">
                    <label for="bolt-preset">Preset</label>
                    <select id="bolt-preset">
                        <option value="m4">M4</option>
                        <option value="m6">M6</option>
                        <option value="m8">M8</option>
                        <option value="m10">M10</option>
                        <option value="custom">Custom</option>
                    </select>
                </div>
                <div class="param-row">
                    <label for="head_width">Head Width (F2F)</label>
                    <input type="number" id="head_width" data-param="head_width" step="0.1">
                </div>
                <div class="param-row">
                    <label for="head_height">Head Height</label>
                    <input type="number" id="head_height" data-param="head_height" step="0.1">
                </div>
                <div class="param-row">
                    <label for="shaft_diameter">Shaft Diameter</label>
                    <input type="number" id="shaft_diameter" data-param="shaft_diameter" step="0.1">
                </div>
            </div>
            </div><!-- /.track-section -->

            <!-- Insert Dimensions -->
            <div class="param-group" id="insert-section">
                <h2>Insert</h2>
                <div class="param-row">
                    <label for="insert_length">Length</label>
                    <input type="number" id="insert_length" data-param="insert_length" step="0.1">
                </div>
                <div class="param-row">
                    <label for="chamfer">Chamfer</label>
                    <input type="number" id="chamfer" data-param="chamfer" step="0.1">
                </div>
            </div>

            <!-- Status -->
            <div class="status" id="status">Ready</div>

            <!-- Actions row -->
            <div class="action-row">
                <button class="render-btn" id="render-btn">Render</button>
                <button class="share-btn" id="share-btn">Share</button>
                <button class="download-btn" id="download-btn" disabled>Download STL</button>
            </div>
        </div>

        <!-- Right Panel: 3D Viewer -->
        <div class="viewer" id="viewer-container"></div>
    </div>

    <script data-goatcounter="https://verjigorm.goatcounter.com/count"
            async src="//gc.zgo.at/count.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
